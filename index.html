let data=null,view="timeline",fMeta="all",fQ="all",fSt="all";
let lastSaved="",currentUser=null,saveTimeout=null,unsubFirestore=null,isAdmin=false;
let dragItem=null;

function getDocRef(){return db.collection("mentor-plan").doc(ADMIN_DOC)}

async function loadFromFirestore(){
  const ref=getDocRef();
  try{
    const doc=await ref.get();
    if(doc.exists){
      data=doc.data().plan;
      // Ensure notes field exists on all items
      Object.values(data).forEach(m=>m.items.forEach(i=>{if(i.notes===undefined)i.notes="";}));
    }else if(isAdmin){
      data=JSON.parse(JSON.stringify(INIT));
      await ref.set({plan:data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }else{data=JSON.parse(JSON.stringify(INIT));}
  }catch(x){console.error("Load:",x);data=JSON.parse(JSON.stringify(INIT));}
}

function listenToFirestore(){
  const ref=getDocRef();
  if(unsubFirestore)unsubFirestore();
  unsubFirestore=ref.onSnapshot(doc=>{
    if(doc.exists&&!doc.metadata.hasPendingWrites){
      data=doc.data().plan;
      Object.values(data).forEach(m=>m.items.forEach(i=>{if(i.notes===undefined)i.notes="";}));
      render();
      showToast(isAdmin?"📥 Sincronizado":"📥 Plan actualizado");
    }
  });
}

function saveToFirestore(){
  if(!isAdmin)return;
  if(saveTimeout)clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{
      await getDocRef().set({plan:data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      lastSaved=new Date().toLocaleTimeString();
      const el=document.getElementById("save-ind");if(el)el.textContent="Guardado: "+lastSaved;
      showToast("✅ Guardado");
    }catch(x){console.error("Save:",x);showToast("⚠️ Error al guardar");}
  },800);
}

function showToast(msg){const t=document.getElementById("sync-toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)}

auth.onAuthStateChanged(async user=>{
  currentUser=user;
  if(user){isAdmin=user.email===ADMIN_EMAIL;await loadFromFirestore();listenToFirestore();render();}
  else{data=null;isAdmin=false;if(unsubFirestore){unsubFirestore();unsubFirestore=null;}renderLogin();}
});

function findItem(mk,id){return data[mk].items.find(i=>i.id===id)}

function setStatus(mk,id,st){
  if(!isAdmin){showToast("🔒 Solo lectura");return}
  const item=findItem(mk,id);if(item){item.status=st;saveToFirestore();render();}
}

function setNotes(mk,id,notes){
  if(!isAdmin)return;
  const item=findItem(mk,id);if(item){item.notes=notes;saveToFirestore();}
}

function setTitle(mk,id,text){
  if(!isAdmin)return;
  const item=findItem(mk,id);if(item){item.text=text;saveToFirestore();render();}
}

function matchQ(iq,fq){if(fq==="all")return true;if(iq===fq||iq==="ALL")return true;if(iq.includes("-"))return iq.split("-").some(q=>q===fq);return false}
function getAllItems(){return Object.entries(data).flatMap(([k,v])=>v.items.map(i=>({...i,mk:k,mt:v.title,mc:v.color,mw:v.weight})))}

// DOM helper
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")el.className=v;
    else el.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c)});
  return el;
}

function openModal(mk,id){
  const item=findItem(mk,id);if(!item)return;
  const meta=data[mk];
  const root=document.getElementById("modal-root");root.innerHTML="";

  const overlay=h("div",{class:"modal-overlay",onClick:ev=>{if(ev.target===overlay)closeModal()}});
  const modal=h("div",{class:"modal"});

  // Header
  const header=h("div",{class:"modal-header"});
  const colorBar=h("div",{class:"modal-color-bar",style:{background:meta.color}});
  const titleArea=h("div",{class:"modal-title-area"});
  let editingTitle=false;

  function renderTitleView(){
    titleArea.innerHTML="";
    const row=h("div",{class:"modal-title"});
    const emoji=h("span",null,(TE[item.type]||"📌")+" ");
    const txt=h("span",{class:"modal-title-text"},item.text);
    row.append(emoji,txt);
    if(isAdmin){
      const btn=h("button",{class:"btn-edit-title",title:"Editar título",onClick:ev=>{ev.stopPropagation();renderTitleEdit()}});
      btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      row.append(btn);
    }
    titleArea.append(row);
  }

  function renderTitleEdit(){
    titleArea.innerHTML="";
    const input=h("input",{class:"modal-title-input",value:item.text});
    input.addEventListener("keydown",ev=>{
      if(ev.key==="Enter"){setTitle(mk,id,input.value);renderTitleView()}
      if(ev.key==="Escape")renderTitleView();
    });
    const saveBtn=h("button",{class:"btn-save",style:{marginTop:"8px",fontSize:"12px",padding:"5px 14px"},onClick:()=>{setTitle(mk,id,input.value);renderTitleView()}});
    saveBtn.textContent="Guardar título";
    titleArea.append(input,saveBtn);
    setTimeout(()=>input.focus(),50);
  }

  renderTitleView();

  const closeBtn=h("button",{class:"modal-close",onClick:closeModal},"×");
  header.append(colorBar,titleArea,closeBtn);
  modal.append(header);

  // Body
  const body=h("div",{class:"modal-body"});

  // Tags
  const tags=h("div",{class:"modal-tags"});
  tags.append(
    h("span",{class:"modal-tag",style:{background:meta.color+"20",color:meta.color}},meta.title),
    h("span",{class:"modal-tag",style:{background:"#f1f5f9",color:"#475569"}},meta.weight),
    h("span",{class:"modal-tag",style:{background:"#f1f5f9",color:"#475569"}},(TE[item.type]||"")+" "+item.type),
    h("span",{class:"modal-tag",style:{background:"#f1f5f9",color:"#475569"}},item.q+(QLabels[item.q]?" · "+QLabels[item.q]:"")),
    h("span",{class:"modal-tag",style:{background:"#f1f5f9",color:"#475569"}},"📅 "+item.month),
    h("span",{class:"modal-tag",style:{background:SC[item.status]+"25",color:SC[item.status]}},SL[item.status])
  );
  body.append(tags);

  // Status
  const statusSection=h("div",{class:"modal-section"});
  statusSection.append(h("div",{class:"modal-section-label"},"Estado"));
  if(isAdmin){
    const sel=h("select",{class:"modal-status-select",onChange:ev=>{setStatus(mk,id,ev.target.value);
      // Update tag
      const stag=modal.querySelector(".status-tag-live");
      if(stag){stag.textContent=SL[ev.target.value];stag.style.background=SC[ev.target.value]+"25";stag.style.color=SC[ev.target.value]}
    }});
    STATUSES.forEach(s=>{const o=h("option",{value:s},SL[s]);if(s===item.status)o.selected=true;sel.append(o)});
    statusSection.append(sel);
  }else{
    statusSection.append(h("div",{style:{padding:"10px 12px",borderRadius:"8px",background:SC[item.status]+"15",color:SC[item.status],fontWeight:"600",fontSize:"14px"}},SL[item.status]));
  }
  body.append(statusSection);

  // Notes
  const notesSection=h("div",{class:"modal-section"});
  notesSection.append(h("div",{class:"modal-section-label"},"Notas"));
  if(isAdmin){
    const textarea=h("textarea",{class:"modal-notes",placeholder:"Agrega notas, enlaces, ideas, seguimiento..."});
    textarea.value=item.notes||"";
    let noteTimeout;
    textarea.addEventListener("input",()=>{
      clearTimeout(noteTimeout);
      noteTimeout=setTimeout(()=>setNotes(mk,id,textarea.value),600);
    });
    notesSection.append(textarea);
  }else{
    if(item.notes){
      notesSection.append(h("div",{class:"modal-notes-readonly"},item.notes));
    }else{
      notesSection.append(h("div",{style:{color:"#94a3b8",fontSize:"13px",fontStyle:"italic"}},"Sin notas aún."));
    }
  }
  body.append(notesSection);

  modal.append(body);

  // Mark the live status tag
  const allTags=tags.querySelectorAll(".modal-tag");
  const lastTag=allTags[allTags.length-1];
  if(lastTag)lastTag.classList.add("status-tag-live");

  overlay.append(modal);
  root.append(overlay);
  document.body.style.overflow="hidden";
}

function closeModal(){
  document.getElementById("modal-root").innerHTML="";
  document.body.style.overflow="";
  render();
}

function renderItem(item,compact){
  const row=h("div",{class:"item",style:{borderLeft:`4px solid ${item.mc}`},onClick:()=>openModal(item.mk,item.id)});
  const chk=h("div",{class:"chk",style:{borderColor:SC[item.status],background:item.status==="completado"?"#10b981":item.status==="en progreso"?"#fef3c7":"#fff"}});
  chk.textContent=item.status==="completado"?"✓":item.status==="en progreso"?"⏳":"";
  const bd=h("div",{class:"item-body"});
  const txt=h("div",{class:"item-text",style:{textDecoration:item.status==="completado"?"line-through":"none",color:item.status==="completado"?"#94a3b8":"#1e293b"}});
  txt.textContent=(TE[item.type]||"📌")+" "+item.text;
  if(item.notes){const dot=h("span",{class:"note-dot",title:"Tiene notas"});txt.append(dot)}
  const meta=h("div",{class:"item-meta"});
  if(!compact){const tag=h("span",{class:"tag",style:{background:item.mc+"20",color:item.mc,marginRight:"6px"}});tag.textContent=item.mt.substring(0,30);meta.append(tag)}
  meta.append(document.createTextNode(item.month+" "));
  const stag=h("span",{class:"tag",style:{marginLeft:"8px",background:SC[item.status]+"30",color:SC[item.status]}});stag.textContent=SL[item.status];meta.append(stag);
  bd.append(txt,meta);row.append(chk,bd);return row;
}

  if(!data||!currentUser)return;
  const app=document.getElementById("app");app.innerHTML="";

            ev.dataTransfer.effectAllowed="move";
          });
          card.addEventListener("dragend",()=>card.classList.remove("dragging"));
        }
        const txt=h("div",{style:{fontSize:"12px",lineHeight:"1.4"}});
        txt.textContent=(TE[item.type]||"📌")+" "+(item.text.length>90?item.text.substring(0,90)+"...":item.text);
        if(item.notes){txt.append(h("span",{class:"note-dot",title:"Tiene notas"}))}
        const meta=h("div",{style:{fontSize:"10px",color:"#94a3b8",marginTop:"4px"}});
        meta.append(h("span",{class:"tag",style:{background:item.mc+"20",color:item.mc}},item.mt.substring(0,25)),document.createTextNode(" "+item.q+" · "+item.month));
        card.append(txt,meta);col.append(card);
      });
      kg.append(col);
    });
    C.append(kg);
  }

  // CHECKLIST
  if(view==="checklist"){
    Object.entries(data).filter(([k])=>fMeta==="all"||fMeta===k).forEach(([mk,meta])=>{
      const items=meta.items.filter(i=>matchQ(i.q,fQ)&&(fSt==="all"||i.status===fSt));
      if(!items.length)return;
      const done=items.filter(i=>i.status==="completado").length;
      const sec=h("div",{class:"cl-section"});
      const hd=h("div",{class:"cl-head"});
      hd.append(h("div",{class:"cl-bar",style:{background:meta.color}}),h("h3",{style:{fontSize:"15px",fontWeight:"700"}},meta.title),h("span",{style:{fontSize:"12px",color:"#64748b",fontWeight:"600"}},"("+meta.weight+")"),h("span",{style:{fontSize:"12px",color:"#10b981",marginLeft:"auto",fontWeight:"600"}},done+"/"+items.length));
      sec.append(hd);
      items.forEach(i=>sec.append(renderItem({...i,mk,mt:meta.title,mc:meta.color,mw:meta.weight},true)));
      C.append(sec);
    });
  }

  // Footer
  const ft=isAdmin
    ?"Sincronización multi-dispositivo activa. Haz clic en cualquier ítem para ver detalles, cambiar estado y agregar notas. En Kanban puedes arrastrar tarjetas entre columnas."
    :"Modo solo lectura. Solo el mentor puede modificar estados y notas. Los cambios se sincronizan en tiempo real.";
  C.append(h("div",{class:"footer"},h("strong",null,isAdmin?"Modo Admin. ":"Modo lectura. "),ft));
  app.append(C);
}
</script>
</body>
</html>
