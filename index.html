function h(tag,a,...ch){const el=document.createElement(tag);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="class")el.className=v;else el.setAttribute(k,v)});ch.flat().forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c)});return el}

async function loadFS(){
  try{const d=await getDocRef().get({source:"server"});if(d.exists){data=d.data().plan;Object.values(data).forEach(m=>m.items.forEach(i=>{if(i.notes===undefined)i.notes="";if(!i.label)i.label="ninguno"}))}else if(isAdmin){data=JSON.parse(JSON.stringify(INIT));await getDocRef().set({plan:data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}else data=JSON.parse(JSON.stringify(INIT))}catch(x){try{const d=await getDocRef().get();if(d.exists){data=d.data().plan;Object.values(data).forEach(m=>m.items.forEach(i=>{if(i.notes===undefined)i.notes="";if(!i.label)i.label="ninguno"}))}else data=JSON.parse(JSON.stringify(INIT))}catch(y){data=JSON.parse(JSON.stringify(INIT))}}
  try{const d=await getMRef().get({source:"server"});if(d.exists)mentees=d.data().list||[];else if(isAdmin){mentees=[];await getMRef().set({list:[],updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}else mentees=[]}catch(x){try{const d=await getMRef().get();if(d.exists)mentees=d.data().list||[];else mentees=[]}catch(y){mentees=[]}}
  try{const d=await getNRef().get({source:"server"});if(d.exists)generalNotes=d.data().text||"";else if(isAdmin){generalNotes="";await getNRef().set({text:"",updatedAt:firebase.firestore.FieldValue.serverTimestamp()})}else generalNotes=""}catch(x){try{const d=await getNRef().get();if(d.exists)generalNotes=d.data().text||"";else generalNotes=""}catch(y){generalNotes=""}}
}
function listenFS(){
  if(unsubF)unsubF();unsubF=getDocRef().onSnapshot(d=>{if(d.exists){data=d.data().plan;Object.values(data).forEach(m=>m.items.forEach(i=>{if(i.notes===undefined)i.notes="";if(!i.label)i.label="ninguno"}));rv()}});
  if(unsubM)unsubM();unsubM=getMRef().onSnapshot(d=>{if(d.exists){mentees=d.data().list||[];rv()}});
  if(unsubN)unsubN();unsubN=getNRef().onSnapshot(d=>{if(d.exists){generalNotes=d.data().text||""}});
}
function saveFS(){if(!isAdmin)return;if(saveTimeout)clearTimeout(saveTimeout);saveTimeout=setTimeout(async()=>{try{await getDocRef().set({plan:data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});lastSaved=new Date().toLocaleTimeString();const el=document.getElementById("save-ind");if(el)el.textContent="Guardado: "+lastSaved;showToast("✅ Guardado")}catch(x){showToast("⚠️ Error")}},800)}

// ===== AUTO BACKUP =====
async function createBackup(){
  if(!isAdmin||!data)return;
  try{
    const ts=new Date().toISOString();
    const backupData={plan:data,mentees:mentees,generalNotes:generalNotes,timestamp:ts,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
    await db.collection("mentor-backups").doc(ts.replace(/[:.]/g,"-")).set(backupData);
    // Limpiar backups viejos, mantener solo los últimos MAX_BACKUPS
    const snaps=await db.collection("mentor-backups").orderBy("createdAt","desc").get();
    if(snaps.size>MAX_BACKUPS){const batch=db.batch();let i=0;snaps.forEach(d=>{i++;if(i>MAX_BACKUPS)batch.delete(d.ref)});await batch.commit()}
    console.log("Backup creado:",ts);
  }catch(x){console.error("Backup error:",x)}
}

function startBackups(){if(backupInterval)clearInterval(backupInterval);createBackup();backupInterval=setInterval(createBackup,5*60*1000)}
function stopBackups(){if(backupInterval){clearInterval(backupInterval);backupInterval=null}}

function findItem(mk,id){return data[mk].items.find(i=>i.id===id)}
function setStatus(mk,id,st){if(!isAdmin){showToast("🔒 Solo lectura");return}const i=findItem(mk,id);if(i){i.status=st;i.updatedAt=new Date().toISOString();if(!allColumns.includes(st)){allColumns.push(st);if(!kanbanColumns.includes(st))kanbanColumns.push(st);SC[st]=SC[st]||"#6366f1";SL[st]=SL[st]||st}saveFS();rv()}}
function setNotes(mk,id,n){if(!isAdmin)return;const i=findItem(mk,id);if(i){i.notes=n;i.updatedAt=new Date().toISOString();saveFS()}}
function setTitle(mk,id,t){if(!isAdmin)return;const i=findItem(mk,id);if(i){i.text=t;i.updatedAt=new Date().toISOString();saveFS();rv()}}
function setLabel(mk,id,l){if(!isAdmin)return;const i=findItem(mk,id);if(i){i.label=l;i.updatedAt=new Date().toISOString();saveFS()}}
function moveToCategory(oldMk,id,newMk){
  if(!isAdmin||oldMk===newMk)return;
  const idx=data[oldMk].items.findIndex(i=>i.id===id);
  if(idx===-1)return;
  const item=data[oldMk].items.splice(idx,1)[0];
  item.updatedAt=new Date().toISOString();
  data[newMk].items.push(item);
  saveFS();rv();
}
function deleteTask(mk,id){
  if(!isAdmin)return;
  data[mk].items=data[mk].items.filter(i=>i.id!==id);
  saveFS();rv();
}
function createTask(mk,text,q,month,type){
  if(!isAdmin||!text.trim())return;
  const id="t-"+Date.now();
  data[mk].items.push({id,q,month,text:text.trim(),type,status:"pendiente",notes:"",label:"ninguno"});
  saveFS();rv();
}

function getDateLabel(isoStr){
  if(!isoStr)return null;
  const d=new Date(isoStr);
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const itemDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.floor((today-itemDay)/(1000*60*60*24));
  const dateStr=d.toLocaleDateString("es-CO",{day:"2-digit",month:"2-digit",year:"numeric"});
  if(diff===0)return"Modificado hoy - "+dateStr;
  if(diff===1)return"Modificado ayer - "+dateStr;
  return"Modificado hace "+diff+" días - "+dateStr;
}

function renderSidebar(){
  const backdrop=h("div",{class:"sidebar-overlay-backdrop",onClick:()=>{sidebarOpen=false;closeSidebarPanel()}});
  const panel=h("div",{class:"sidebar-overlay"});

  const closeRow=h("div",{class:"sidebar-close"});
  closeRow.append(h("div",{class:"sidebar-title",style:{margin:"0"}},"🕐 Últimas actualizaciones"),h("button",{class:"sidebar-close-btn",onClick:()=>{sidebarOpen=false;closeSidebarPanel()}},"✕ Cerrar"));
  panel.append(closeRow);

  const allItems=getAllItems().filter(i=>i.updatedAt).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));

  if(!allItems.length){
    panel.append(h("div",{class:"sidebar-empty"},"No hay actualizaciones recientes."));
    document.body.append(backdrop,panel);return;
  }

  let lastLabel="";
  const maxItems=30;
  allItems.slice(0,maxItems).forEach(item=>{
    const label=getDateLabel(item.updatedAt);
    if(label&&label!==lastLabel){
      panel.append(h("div",{class:"sidebar-date-label"},label));
      lastLabel=label;
    }
    const card=h("div",{class:"sidebar-card",style:{borderLeft:`3px solid ${item.mc}`},onClick:()=>{sidebarOpen=false;closeSidebarPanel();openTaskModal(item.mk,item.id)}});
    const txt=h("div",{class:"sidebar-card-text"});

    const meta=h("div",{class:"sidebar-card-meta"});

    meta.append(h("span",{class:"tag",style:{background:(SC[item.status]||"#94a3b8")+"30",color:SC[item.status]||"#94a3b8",fontSize:"9px"}},SL[item.status]||item.status));
    if(item.label&&item.label!=="ninguno"){meta.append(h("span",{class:"tag "+(LABEL_CSS[item.label]||""),style:{fontSize:"9px"}},LABEL_NAMES[item.label]))}
