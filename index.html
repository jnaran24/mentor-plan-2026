async function loadFromFirestore() {
  const ref = getDocRef();
  try {
    const doc = await ref.get();
    if (doc.exists) {
      data = doc.data().plan;
    } else if (isAdmin) {
      data = JSON.parse(JSON.stringify(INIT));
      await ref.set({ plan: data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    } else {
      data = JSON.parse(JSON.stringify(INIT));
    }
  } catch (e) {
    console.error("Load error:", e);
    data = JSON.parse(JSON.stringify(INIT));
  }
}

function listenToFirestore() {
  const ref = getDocRef();
  if (unsubFirestore) unsubFirestore();
  unsubFirestore = ref.onSnapshot(doc => {
    if (doc.exists && doc.metadata.hasPendingWrites === false) {
      data = doc.data().plan;
      render();
      if (!isAdmin) showToast("📥 Plan actualizado por el mentor");
      else showToast("📥 Sincronizado");
    }
  });
}

function saveToFirestore() {
  if (!isAdmin) return;
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const ref = getDocRef();
    if (!ref || !data) return;
    try {
      await ref.set({ plan: data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      lastSaved = new Date().toLocaleTimeString();
      updateSaveIndicator();
      showToast("✅ Guardado");
    } catch (e) {
      console.error("Save error:", e);
      showToast("⚠️ Error al guardar");
    }
  }, 800);
}

function showToast(msg) {
  const t = document.getElementById("sync-toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function updateSaveIndicator() {
  const el = document.getElementById("save-ind");
  if (el) el.textContent = lastSaved ? "Guardado: " + lastSaved : "";
}

// AUTH
auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    await loadFromFirestore();
    listenToFirestore();
    render();
  } else {
    data = null; isAdmin = false;
    if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
    renderLogin();
  }
});

function signIn() { auth.signInWithPopup(provider).catch(e => { console.error("Auth error:", e); alert("Error de autenticación: " + e.message); }); }
function signOut() { auth.signOut(); }

// LOGIC
function toggle(mk, id) {
  if (!isAdmin) { showToast("🔒 Solo lectura — solo el mentor puede modificar"); return; }
  const item = data[mk].items.find(i => i.id === id);
  if (item) { const idx = STATUSES.indexOf(item.status); item.status = STATUSES[(idx + 1) % 3]; saveToFirestore(); render(); }
}

function resetAll() {
  if (!isAdmin) return;
  if (confirm("¿Reiniciar todo el progreso? No se puede deshacer.")) { data = JSON.parse(JSON.stringify(INIT)); saveToFirestore(); render(); }
}

function matchQ(iq, fq) {
  if (fq === "all") return true;
  if (iq === fq || iq === "ALL") return true;
  if (iq.includes("-")) return iq.split("-").some(q => q === fq);
  return false;
}

function getAllItems() {
  return Object.entries(data).flatMap(([k, v]) => v.items.map(i => ({ ...i, mk: k, mt: v.title, mc: v.color })));
}

// RENDER
function e(tag, attrs, ...ch) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "class") el.className = v;
    else el.setAttribute(k, v);
  });
  ch.flat().forEach(c => { if (c != null) el.append(typeof c === "string" ? document.createTextNode(c) : c); });
  return el;
}

function renderLogin() {
  const app = document.getElementById("app"); app.innerHTML = "";
  const screen = e("div", { class: "login-screen" });
  const card = e("div", { class: "login-card" });
  const btn = e("button", { class: "btn-google", onClick: signIn });

  btn.append(svg, document.createTextNode("Iniciar con Google"));
  card.append(e("div", { class: "emoji" }, "🎯"), e("h1", null, "Plan Mentor Frontend 2026"), e("p", null, "Juan Camilo Naranjo Marín · CIS Protección"), e("p", { style: { color: "#94a3b8", fontSize: "13px", marginBottom: "24px" } }, "Inicia sesión para ver el plan. Solo el mentor puede modificarlo."), btn);
  screen.append(card); app.append(screen);
}

function renderItem(item, compact) {
  const cls = isAdmin ? "item clickable" : "item readonly";
  const row = e("div", { class: cls, style: { borderLeft: `4px solid ${item.mc}` }, onClick: () => toggle(item.mk, item.id) });
  const chk = e("div", { class: "chk", style: { borderColor: SC[item.status], background: item.status === "completado" ? "#10b981" : item.status === "en progreso" ? "#fef3c7" : "#fff" } });
  chk.textContent = item.status === "completado" ? "✓" : item.status === "en progreso" ? "⏳" : "";
  const body = e("div", { class: "item-body" });
  const txt = e("div", { class: "item-text", style: { textDecoration: item.status === "completado" ? "line-through" : "none", color: item.status === "completado" ? "#94a3b8" : "#1e293b" } });
  txt.textContent = (TE[item.type] || "📌") + " " + item.text;
  const meta = e("div", { class: "item-meta" });
  if (!compact) { const tag = e("span", { class: "tag", style: { background: item.mc + "20", color: item.mc, marginRight: "6px" } }); tag.textContent = item.mt.substring(0, 30); meta.append(tag); }
  meta.append(document.createTextNode(item.month + " "));
  const stag = e("span", { class: "tag", style: { marginLeft: "8px", background: SC[item.status] + "30", color: SC[item.status] } }); stag.textContent = SL[item.status]; meta.append(stag);
  body.append(txt, meta); row.append(chk, body); return row;
}

function render() {
  if (!data || !currentUser) return;
  const app = document.getElementById("app"); app.innerHTML = "";
  const container = e("div", { class: "app-container" });

  // User bar
  const ub = e("div", { class: "user-bar" });
  const ui = e("div", { class: "user-info" });
  if (currentUser.photoURL) ui.append(e("img", { class: "user-avatar", src: currentUser.photoURL, referrerpolicy: "no-referrer" }));
  ui.append(document.createTextNode(currentUser.displayName || currentUser.email));
  ub.append(ui);
  if (isAdmin) ub.append(e("span", { class: "badge-admin" }, "Admin"));
  else ub.append(e("span", { class: "badge-readonly" }, "Solo lectura"));
  ub.append(e("button", { class: "btn-logout", onClick: signOut }, "Cerrar sesión"));
  container.append(ub);

  const all = getAllItems();
  const stats = { t: all.length, c: all.filter(i => i.status === "completado").length, p: all.filter(i => i.status === "en progreso").length, pe: all.filter(i => i.status === "pendiente").length };
  const pct = stats.t ? Math.round(stats.c / stats.t * 100) : 0;

  // Header
  const hdr = e("div", { class: "header" });
  const hTop = e("div", { class: "header-top" });
  hTop.append(e("div", null, e("h1", null, "Plan Mentor Frontend 2026"), e("p", null, "Juan Camilo Naranjo Marín · CIS Protección · Líder Guild Frontend")));
  if (isAdmin) hTop.append(e("div", { class: "save-indicator" }, e("span", { id: "save-ind" }, lastSaved ? "Guardado: " + lastSaved : ""), e("span", { id: "save-dot", class: "save-dot", style: { background: "#10b981" } })));
  hdr.append(hTop);
  const sr = e("div", { class: "stats-row" });
  [[pct + "%", "Progreso total", "#fff"], [stats.c, "Completados", "#10b981"], [stats.p, "En progreso", "#f59e0b"], [stats.pe, "Pendientes", "#94a3b8"]].forEach(([n, l, c]) => {
    sr.append(e("div", { class: "stat-box" }, e("div", { class: "stat-num", style: { color: c } }, String(n)), e("div", { class: "stat-label" }, l)));
  });
  hdr.append(sr);
  const pbg = e("div", { class: "progress-bg" }); pbg.append(e("div", { class: "progress-fill", style: { width: pct + "%" } })); hdr.append(pbg);
  container.append(hdr);

  // Meta cards
  const mg = e("div", { class: "meta-grid" });
  Object.entries(data).forEach(([k, v]) => {
    const t = v.items.length, c = v.items.filter(i => i.status === "completado").length, p = t ? Math.round(c / t * 100) : 0;
    const card = e("div", { class: "meta-card" + (fMeta === k ? " active" : ""), style: { borderLeft: `4px solid ${v.color}`, "--mc": v.color }, onClick: () => { fMeta = fMeta === k ? "all" : k; render(); } });
    card.append(e("div", { class: "meta-weight", style: { color: v.color } }, v.weight), e("div", { class: "meta-title" }, v.title));
    const mb = e("div", { class: "mini-bg" }); mb.append(e("div", { class: "mini-fill", style: { background: v.color, width: p + "%" } }));
    card.append(mb, e("div", { class: "meta-count" }, `${c}/${t} (${p}%)`)); mg.append(card);
  });
  container.append(mg);

  // Controls
  const ctrl = e("div", { class: "controls" });
  [["timeline", "Cronológico"], ["kanban", "Kanban"], ["checklist", "Checklist"]].forEach(([v, l]) => {
    ctrl.append(e("button", { class: "tab" + (view === v ? " on" : ""), onClick: () => { view = v; render(); } }, l));
  });
  ctrl.append(e("span", { class: "sep" }));
  const selQ = e("select", { onChange: ev => { fQ = ev.target.value; render(); } });
  [["all", "Todos los Q"], ["Q1", "Q1"], ["Q2", "Q2"], ["Q3", "Q3"], ["Q4", "Q4"]].forEach(([v, l]) => { const o = e("option", { value: v }, l); if (v === fQ) o.selected = true; selQ.append(o); });
  ctrl.append(selQ);
  const selS = e("select", { onChange: ev => { fSt = ev.target.value; render(); } });
  [["all", "Todos"], ["pendiente", "Pendiente"], ["en progreso", "En progreso"], ["completado", "Completado"]].forEach(([v, l]) => { const o = e("option", { value: v }, l); if (v === fSt) o.selected = true; selS.append(o); });
  ctrl.append(selS);
  if (fMeta !== "all" || fQ !== "all" || fSt !== "all") ctrl.append(e("button", { class: "btn-clear", onClick: () => { fMeta = "all"; fQ = "all"; fSt = "all"; render(); } }, "Limpiar filtros"));
  if (isAdmin) ctrl.append(e("button", { class: "btn-reset", onClick: resetAll }, "Reiniciar todo"));
  container.append(ctrl);

  const filtered = getAllItems().filter(i => (fMeta === "all" || i.mk === fMeta) && matchQ(i.q, fQ) && (fSt === "all" || i.status === fSt));

  // Timeline
  if (view === "timeline") {
    ["Q1", "Q2", "Q3", "Q4"].filter(q => fQ === "all" || fQ === q).forEach(q => {
      const qI = filtered.filter(i => matchQ(i.q, q)).sort((a, b) => MO.indexOf(a.month) - MO.indexOf(b.month));
      if (!qI.length) return;
      const sec = e("div", { style: { marginBottom: "20px" } });
      sec.append(e("h3", { class: "q-head" }, q + " · " + (q === "Q1" ? "Ene–Mar" : q === "Q2" ? "Abr–Jun" : q === "Q3" ? "Jul–Sep" : "Oct–Dic") + " 2026"));
      qI.forEach(i => sec.append(renderItem(i, false)));
      container.append(sec);
    });
  }

  // Kanban
  if (view === "kanban") {
    const kg = e("div", { class: "kanban" });
    STATUSES.forEach(st => {
      const col = e("div", { class: "kcol" });
      const hd = e("div", { class: "kcol-head" });
      const cnt = filtered.filter(i => i.status === st);
      hd.append(e("div", { class: "kdot", style: { background: SC[st] } }), e("span", { style: { fontWeight: "700", fontSize: "14px" } }, SL[st]), e("span", { style: { fontSize: "12px", color: "#94a3b8", marginLeft: "auto" } }, String(cnt.length)));
      col.append(hd);
      cnt.forEach(item => {
        const cls = isAdmin ? "kcard clickable" : "kcard readonly";
        const card = e("div", { class: cls, style: { borderLeft: `3px solid ${item.mc}` }, onClick: () => toggle(item.mk, item.id) });
        card.append(e("div", { style: { fontSize: "12px", lineHeight: "1.4" } }, (TE[item.type] || "📌") + " " + (item.text.length > 90 ? item.text.substring(0, 90) + "..." : item.text)),
          e("div", { style: { fontSize: "10px", color: "#94a3b8", marginTop: "4px" } }, e("span", { class: "tag", style: { background: item.mc + "20", color: item.mc } }, item.mt.substring(0, 25)), " " + item.q + " · " + item.month));
        col.append(card);
      });
      kg.append(col);
    });
    container.append(kg);
  }

  // Checklist
  if (view === "checklist") {
    Object.entries(data).filter(([k]) => fMeta === "all" || fMeta === k).forEach(([mk, meta]) => {
      const items = meta.items.filter(i => matchQ(i.q, fQ) && (fSt === "all" || i.status === fSt));
      if (!items.length) return;
      const done = items.filter(i => i.status === "completado").length;
      const sec = e("div", { class: "cl-section" });
      const hd = e("div", { class: "cl-head" });
      hd.append(e("div", { class: "cl-bar", style: { background: meta.color } }), e("h3", { style: { fontSize: "15px", fontWeight: "700" } }, meta.title), e("span", { style: { fontSize: "12px", color: "#64748b", fontWeight: "600" } }, "(" + meta.weight + ")"), e("span", { style: { fontSize: "12px", color: "#10b981", marginLeft: "auto", fontWeight: "600" } }, done + "/" + items.length));
      sec.append(hd);
      items.forEach(i => sec.append(renderItem({ ...i, mk, mt: meta.title, mc: meta.color }, true)));
      container.append(sec);
    });
  }

  // Footer
  const footerText = isAdmin
    ? "Sincronización multi-dispositivo activa. Tus cambios se guardan en Firebase en tiempo real. Haz clic en cualquier ítem para ciclar: Pendiente → En progreso → Completado."
    : "Estás en modo solo lectura. Solo el mentor (Juan Camilo) puede modificar el estado de los ítems. Los cambios se sincronizan en tiempo real.";
  container.append(e("div", { class: "footer" }, e("strong", null, isAdmin ? "Modo Admin. " : "Modo lectura. "), footerText));
  app.append(container);
}
</script>
