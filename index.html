function renderUpdatesContent(){

  panel.innerHTML="";
  const header=h("div",{class:"updates-panel-header"});
  header.append(h("div",{class:"sidebar-title",style:{margin:"0"}},"🕐 Últimas actualizaciones"));
  header.append(h("button",{class:"updates-panel-close",onClick:()=>{sidebarOpen=false;panel.classList.remove("open")}},"✕ Cerrar"));
  panel.append(header);
  if(!data){panel.append(h("div",{class:"sidebar-empty"},"Cargando..."));return}
  const allItems=getAllItems().filter(i=>i.updatedAt).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  if(!allItems.length){panel.append(h("div",{class:"sidebar-empty"},"No hay actualizaciones recientes."));return}
  let lastLabel="";
  allItems.slice(0,30).forEach(item=>{
    const label=getDateLabel(item.updatedAt);
    if(label&&label!==lastLabel){panel.append(h("div",{class:"sidebar-date-label"},label));lastLabel=label}
    const card=h("div",{class:"sidebar-card",style:{borderLeft:`3px solid ${item.mc}`},onClick:()=>openTaskModal(item.mk,item.id)});

    if(item.notes)txt.append(h("span",{class:"note-dot"}));
    const meta=h("div",{class:"sidebar-card-meta"});
    meta.append(h("span",{class:"tag",style:{background:item.mc+"20",color:item.mc,fontSize:"9px"}},item.mt.substring(0,20)));
    meta.append(h("span",{class:"tag",style:{background:(SC[item.status]||"#94a3b8")+"30",color:SC[item.status]||"#94a3b8",fontSize:"9px"}},SL[item.status]||item.status));
    if(item.label&&item.label!=="ninguno")meta.append(h("span",{class:"tag "+(LABEL_CSS[item.label]||""),style:{fontSize:"9px"}},LABEL_NAMES[item.label]));
    card.append(txt,meta,h("div",{class:"sidebar-card-time"},new Date(item.updatedAt).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})));

}

  if(view==="kanban"){const kg=h("div",{class:"kanban"});STATUSES.forEach(st=>{const col=h("div",{class:"kcol"});col.addEventListener("dragover",ev=>{ev.preventDefault();col.classList.add("drag-over")});col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));col.addEventListener("drop",ev=>{ev.preventDefault();col.classList.remove("drag-over");if(!isAdmin||!dragItem)return;setStatus(dragItem.mk,dragItem.id,st);dragItem=null});const hd=h("div",{class:"kcol-head"});const cnt=filtered.filter(i=>i.status===st);hd.append(h("div",{class:"kdot",style:{background:SC[st]}}),h("span",{style:{fontWeight:"700",fontSize:"14px"}},SL[st]),h("span",{style:{fontSize:"12px",color:"var(--text4)",marginLeft:"auto"}},String(cnt.length)));col.append(hd);cnt.forEach(item=>{const card=h("div",{class:"kcard",style:{borderLeft:`3px solid ${item.mc}`},draggable:isAdmin?"true":"false",onClick:()=>openTaskModal(item.mk,item.id)});if(isAdmin){card.addEventListener("dragstart",ev=>{dragItem={mk:item.mk,id:item.id};card.classList.add("dragging");ev.dataTransfer.effectAllowed="move"});card.addEventListener("dragend",()=>card.classList.remove("dragging"))}const txt=h("div",{style:{fontSize:"12px",lineHeight:"1.4"}});txt.textContent=(TE[item.type]||"📌")+" "+(item.text.length>90?item.text.substring(0,90)+"...":item.text);if(item.notes)txt.append(h("span",{class:"note-dot"}));const meta=h("div",{style:{fontSize:"10px",color:"var(--text4)",marginTop:"4px",display:"flex",flexWrap:"wrap",gap:"4px",alignItems:"center"}});meta.append(h("span",{class:"tag",style:{background:item.mc+"20",color:item.mc}},item.mt.substring(0,25)));meta.append(h("span",{style:{color:"var(--text4)"}},item.q+" · "+item.month));if(item.label&&item.label!=="ninguno")meta.append(h("span",{class:"tag "+(LABEL_CSS[item.label]||""),style:{fontSize:"10px",fontWeight:"700"}},LABEL_NAMES[item.label]));card.append(txt,meta);col.append(card)});kg.append(col)});C.append(kg)}

  if(view==="checklist"){Object.entries(data).filter(([k])=>fMeta==="all"||fMeta===k).forEach(([mk,meta])=>{const items=meta.items.filter(i=>matchQ(i.q,fQ)&&(fSt==="all"||i.status===fSt));if(!items.length)return;const done=items.filter(i=>i.status==="completado").length;const sec=h("div",{class:"cl-section"});const hd=h("div",{class:"cl-head"});hd.append(h("div",{class:"cl-bar",style:{background:meta.color}}),h("h3",{style:{fontSize:"15px",fontWeight:"700"}},meta.title),h("span",{style:{fontSize:"12px",color:"var(--text3)",fontWeight:"600"}},"("+meta.weight+")"),h("span",{style:{fontSize:"12px",color:"#10b981",marginLeft:"auto",fontWeight:"600"}},done+"/"+items.length));sec.append(hd);items.forEach(i=>sec.append(renderItem({...i,mk,mt:meta.title,mc:meta.color,mw:meta.weight},true)));C.append(sec)})}

  C.append(h("div",{class:"footer"},h("strong",null,isAdmin?"Modo Admin. ":"Modo lectura. "),isAdmin?"Haz clic en ítems para detalles. En Kanban arrastra tarjetas.":"Los cambios se sincronizan en tiempo real."));
  app.append(C);
}
</script>
